GSMC_Form_Mapping:
  version: 1.0
  description: >
    Googleフォーム「GSMCタイプ診断」の回答CSVと、
    GSMC_Personality_Diagnostic（理論YAML）を紐づけるためのマッピング定義。

  response_file_format:
    timestamp_column: "タイムスタンプ"
    name_column: "名前を入力してください"
    yes_value: "はい"
    no_value: "いいえ"

  scoring:
    # 各質問「はい/いいえ」で G/S/M/C に何点足すか
    # weight はあとで調整してOK
    questions:

      Q1:
        column: "Q1.新しいアイデアを思いついたら即試したくなる方だ。"
        scale: "micro"
        logical_target:
          type: "M"
          level: "micro"
          rationale: "瞬間的に行動に移す傾向＝micro-M指標"
        scores_if_yes:
          M: 2
          G: 0.5   # ひらめき成分も少し加点しておく
        scores_if_no:
          M: 0

      Q2:
        column: "Q2. 初めての場所ではまず「空気を読む」方だ。"
        scale: "micro"
        logical_target:
          type: "S"
          level: "micro"
          rationale: "場のテンション・間を読む＝Stillness系の感受性"
        scores_if_yes:
          S: 2
          C: 0.5   # 意味・文脈を読むのでCoherenceも少し
        scores_if_no:
          S: 0

      Q3:
        column: "Q3. 不安よりも「とりあえず動く」ことの方が多い。"
        scale: "micro"
        logical_target:
          type: "M"
          level: "micro"
          rationale: "不安より先に動く＝reactiveなMotion傾向"
        scores_if_yes:
          M: 2
        scores_if_no:
          S: 1     # 動く前に一回落ち着く＝Stillness寄り

      Q4:
        column: "Q4. 物事が「整ってから」動くタイプだ。"
        scale: "meso"
        logical_target:
          type: "C"
          level: "meso"
          rationale: "全体が整ってから動く＝整合性・構造重視"
        scores_if_yes:
          C: 2
          S: 1     # 状態が整ってから、という静けさ要素も加点
        scores_if_no:
          M: 1     # 整ってなくても動ける＝Motion寄り

      Q5:
        column: "Q5. 何かを決めるときには「閃き」が最初に来ることが多い。"
        scale: "micro"
        logical_target:
          type: "G"
          level: "micro"
          rationale: "直感・ひらめき先行＝Genesysの初期条件感受性"
        scores_if_yes:
          G: 2
          M: 0.5   # ひらめきから即動く人もいるので少し加点
        scores_if_no:
          C: 1     # 閃きより構造や意味で決める＝Coherence寄り

      Q7:
        column: "Q7. やる気はなかろうが動ける方だ。"
        scale: "meso"
        logical_target:
          type: "M"
          level: "meso"
          rationale: "状態に関わらず動ける＝行動OSが強い"
        scores_if_yes:
          M: 2
          S: 0.5   # メンタルの復元力・安定も少し
        scores_if_no:
          S: 1     # 気分に左右される＝Stillness側の揺らぎ多め

      Q8_story:
        column: "Q8.（Q7で「はい」の方）その都度の経験を、後から1本のストーリー・理論などの「流れ」に繋げて考えがちだ "
        scale: "meso"
        logical_target:
          type: "C"
          level: "meso"
          rationale: "経験をストーリー・理論に統合する＝Coherenceそのもの"
        scores_if_yes:
          C: 2
        scores_if_no:
          M: 0.5   # 経験を流れとして見ない＝瞬間ごとのMotion寄り

      Q6_bigpicture:
        column: "Q6. 感情が乱れようが、全体像さえ見れれば落ち着く。"
        scale: "meso"
        logical_target:
          type: "G"
          level: "meso"
          rationale: "全体像で落ち着く＝構造レベルの理解で安定"
        scores_if_yes:
          G: 2
          C: 1     # 全体像＝意味構造でもあるので少しCoherence
        scores_if_no:
          S: 1     # 感情の乱れに強く影響される＝Stillnessが揺れやすい

      Q10_act_without_meaning:
        column: "Q10.意味が分かる/分からないに関わらず、行動には移せる"
        scale: "micro"
        logical_target:
          type: "M"
          level: "micro"
          rationale: "意味より先に行動できる＝Motion優勢"
        scores_if_yes:
          M: 2
        scores_if_no:
          C: 2     # 意味が分からないと動けない＝Coherence優勢

      Q8_balance:
        column: "Q8. 周囲とのバランスが良いと行動しやすいことが多い。"
        scale: "meso"
        logical_target:
          type: "S"
          level: "meso"
          rationale: "バランス＝Stillnessフィールド（テンションの均衡）"
        scores_if_yes:
          S: 2
          M: 0.5   # バランス取れたときのみ動くので少しMotion
        scores_if_no:
          M: 1     # バランス関係なく動ける＝Motion寄り

      Q9_new_idea_when_bad:
        column: "Q9. いくら調子が悪かろうと、「新しいこと」は思いつくことができる。"
        scale: "micro"
        logical_target:
          type: "G"
          level: "micro"
          rationale: "状態に関係なく新しい発想が湧く＝Genesys優勢"
        scores_if_yes:
          G: 2
        scores_if_no:
          S: 1     # 調子に左右される＝Stillnessの揺らぎ

      Q10_experience_saves:
        column: "Q10. 本当に調子が悪かった時に自分を救ってくれるのは「自分の経験」だった率が高めだ。"
        scale: "macro"
        logical_target:
          type: "C"
          level: "macro"
          rationale: "経験を蓄積し、人生ストーリーの一部として機能させている"
        scores_if_yes:
          C: 2
          M: 1     # 行動経験が支えになる＝Motionも加点
        scores_if_no:
          G: 1     # 経験以外（直感や構造）に依存する可能性

  aggregation:
    # 各タイプの最終スコアのまとめ方
    weights_by_scale:
      micro: 0.3
      meso: 0.3
      macro: 0.4
    # ここは理論YAMLの score_method と対応
    formula: >
      FinalScore[type] = 0.3 * micro_score[type]
                        + 0.3 * meso_score[type]
                        + 0.4 * macro_score[type]

  output:
    dominant_type:
      description: "最もスコアが高いタイプ (G / S / M / C)"
    sub_type:
      description: "第二に高いタイプ"
    extra:
      include_raw_scores: true
      include_scale_breakdown: true
